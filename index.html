
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Service Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <script>
        // Apply theme immediately to prevent flashing
        (function() {
            const savedTheme = localStorage.getItem('service_timer_theme');
            const isDark = savedTheme !== 'light';
            document.documentElement.classList.toggle('dark', isDark);
        })();
    </script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        /* Default theme background to avoid white flash in dark mode */
        html.dark body {
            background-color: #121212;
            color: white;
        }
        html:not(.dark) body {
            background-color: #f3f4f6;
            color: #111;
        }
        .bebas-font {
            font-family: 'Bebas Neue', cursive;
        }
        /* Custom scrollbar hiding for wheels */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Hide spin buttons for Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* Hide spin buttons for Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }
        /* Wheel 3D effect masks */
        .wheel-mask {
            mask-image: linear-gradient(to bottom, transparent, black 35%, black 65%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 35%, black 65%, transparent);
        }
    </style>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
